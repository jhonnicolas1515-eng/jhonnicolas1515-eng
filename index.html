<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Sorpresa para Jhonny!</title>
    <style>
        body {
            background-color: #ffeaa7;
            font-family: 'Arial', sans-serif;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            z-index: 10;
        }
        h1 { color: #d63031; font-size: 2.5rem; }
        .cake { font-size: 4rem; margin: 10px; }
        
        button {
            background-color: #ff7675;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 5px 15px rgba(214, 48, 49, 0.3);
        }
        button:hover { background-color: #d63031; transform: scale(1.1); }
        
        #mensaje-extra {
            display: none;
            margin-top: 20px;
            font-weight: bold;
            color: #6c5ce7;
            font-size: 1.3rem;
            animation: aparecer 1s ease-out;
        }
        
        @keyframes aparecer {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .confeti {
            position: absolute;
            font-size: 1.5rem;
            animation: caer 3s linear forwards;
            top: -50px;
        }
        @keyframes caer {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Audio de música de fondo (puedes cambiar musica.mp3 por tu archivo) -->
    <audio id="miMusica">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="card">
        <div class="cake">🎂</div>
        <h1>¡Feliz Cumpleaños, Jhonny!</h1>
        <p>Presiona el botón para tu sorpresa musical...</p>
        
        <button onclick="mostrarSorpresa()">¡Haz clic aquí! 🎁</button>
        
        <div id="mensaje-extra">
            🌟 ¡Felicidades Jhonny! Eres increíble. 🎉
        </div>
    </div>

    <script>
        function mostrarSorpresa() {
            // 1. Reproducir la música principal
            const musica = document.getElementById("miMusica");
            musica.play();

            // 2. Mostrar el mensaje
            document.getElementById('mensaje-extra').style.display = 'block';
            
            // 3. Crear confeti con sonido
            for(let i = 0; i < 40; i++) {
                setTimeout(() => {
                    crearUnConfeti();
                }, i * 100); // Salen uno tras otro
            }
        }

        function crearUnConfeti() {
            // Sonido de "pop" (usamos un enlace de Pixabay o similar)
            const audioPop = new Audio("nastelbom-happy-birthday-495860.mp3")
            audioPop.volume = 0.2; // Volumen bajo para que no aturda
            audioPop.play();

            const confeti = document.createElement('div');
            confeti.innerText = ['🎉','✨','🎈','🎊','⭐'][Math.floor(Math.random()*5)];
            confeti.classList.add('confeti');
            confeti.style.left = Math.random() * 100 + 'vw';
            confeti.style.animationDuration = (Math.random() * 2 + 2) + 's';
            confeti.style.opacity = Math.random();
            document.body.appendChild(confeti);
            
            setTimeout(() => confeti.remove(), 4000);
        }
    </script>

</body>
</html>
